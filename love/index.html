<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Love</title>
    <link rel="shortcut icon" href="../images/heart.ico" type="image/x-icon">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' href="../css/common.css">
    <link rel="stylesheet" type='text/css' href="../css/love.css">
    <script src="https://cdn.bootcss.com/jquery/1.12.4/jquery.min.js"></script>
    <script src="https://blog-static.cnblogs.com/files/zhoujl-5071/jquery.rotate.js"></script>
    <script src="../js/love.js"></script>
    <script src="../js/snowfall.jquery.js"></script>
</head>
<body>
    <div id="main" class="main">
        <div id="background1" class="background1">
            <img id="heart" class="background_image" src="../images/heartbackground.png">
            <img id="cartoon" class="cartoon_img" src="../images/cartoon.png">
            <img id="small_heart" class="small_heart" src="../images/small_heart.png">
        </div>
        <div id="background2" class="background2">
            <img id="finger" class="finger" src="../images/finger.png">
            <img id="mini_heart" class="mini_heart" src="../images/mini_heart.png">
            <div class="frame">
                <img id="photo_0" class="photo_display" src="../images/Haruko Akagi.jpeg">
            </div>
        </div>
        <div id="background3" class="background3"></div>
        <div id="background4" class="background4">
            <div class="left">
                <img class="together" src="../images/together.jpeg">
            </div>
            <div class="right">
                <img class="showLove" src="../images/showLove.png">
                <img id="myheart" src="../images/mini_heart.png" class="myheart">
                <text class="title">前<br>途<br>似<br>锦<br>呀<br>&nbsp&nbsp！</text>
            </div>
        </div>
    </div>
    <script>
        $(document).snowfall('clear');
        $(document).snowfall({
            image: "../images/mini_heart.png",
            flakeCount:30,
            minSize: 5,
            maxSize: 22
        });
    </script>
    <audio src="../audio/All Falls Down.m4a" autoplay="autoplay" preload="auto"></audio>
</body>
</html>
