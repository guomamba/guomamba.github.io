<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="images/basketball.ico" type="image/x-icon">
        <title>Manba</title>
        <link rel="stylesheet" href="css/common.css">
        <link rel="stylesheet" href="css/style.css">
        <script src="js/index.js"></script>
    </head>
    <body class="main">    
        <header class="navigator">
            <div class="center navigator_content">
                <div class="logo">
                    <img src="images/basketball.png" alt="logo" class="logo_img">
                    <div class="logo_name">
                        <h2 style="color: aliceblue;">Manba</h2>
                        <h6 style="color: #ababab;">时光不再仍是挚爱</h6>
                    </div>
                </div>
                <div class="content">
                    <ul class="list">
                        <li class="list_item_selected"><a class="selected" href="/">首页</a></li>
                        <li class="list_item"><a href="/page/code">编程</a></li>
                        <li class="list_item"><a href="/page/travel">旅行</a></li>
                        <li class="list_item"><a href="/page/game">游戏</a></li>
                        <li class="list_item"><a href="/page/about">关于</a></li>
                    </ul>
                </div>
            </div>
        </header>
        <div class="banner-background">
            <div class="banner">
                <ul class="banner_autoplay">
                    <li><img id="image0" class="banner_image"></li>
                    <li><img id="image1" class="banner_image"></li>
                    <li><img id="image2" class="banner_image"></li>
                    <li><img id="image3" class="banner_image"></li>
                    <li><img id="image4" class="banner_image"></li>
                    <li><img id="image5" class="banner_image"></li>
                    <li><img id="image6" class="banner_image"></li>
                    <li><img id="image7" class="banner_image"></li>
                    <li><img id="image8" class="banner_image"></li>
                    <li><img id="image9" class="banner_image"></li>
                </ul>
                <img id="image_left" class="btn_left" src="images/left.png">
                <img id="image_right" class="btn_right" src="images/right.png">
            </div>
        </div>
        <script src="https://cdn.bootcss.com/jquery/1.12.4/jquery.min.js"></script>
        <script type="text/javascript">
            $.ajax({
                type: 'GET',
                url: 'http://www.hjmin.com/banner',
                data: '',
                dataType: 'JSON',
                success: function (res) {
                    var banners = res.banners;
                    var arr = new Array()
                    for(var i=0;i<banners.length;i++){
                        arr.push(banners[i].imageUrl)
                    }
                    for (var index = 0; index < arr.length+1; index++) {
                        $("#image"+index).attr("src",arr[index]);               
                    }
                },
                error: function () {
                    alert("网络连接失败！")
                }
            });
            $("#image_left").click(function(){
                alert("clicked!")
            });
            $("#image_right").click(function(){
                alert("clicked!")
            });
        </script>
    </body>
</html>
