                <div class="content">

                        <li class="list_item"><a href="/page/code">编程</a></li>
                        <li class="list_item"><a href="/page/travel">旅行</a></li>

                <img id="image_right" class="btn_right" src="images/right.png">
            </div>
        </div>
        <div class="container">
            <div class="main_title center">最新文章</div>
        </div>
        <div class="article">
            <div class="row center">
                <div class="article_wrap">
                    <div class="article_item">
                        <div class="tag"></div>
                        <div class="pic_box"></div>
                        <div class="article_panel"></div>
                        <div class="tools"></div>
                    </div>
                </div>    
            </div>
