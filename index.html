<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="images/basketball.ico" type="image/x-icon">
        <title>Manba</title>
        <link rel="stylesheet" href="css/common.css">
        <link rel="stylesheet" href="css/style.css">
        <script src="js/index.js"></script>
    </head>
    <body class="main">    
        <header class="navigator">
            <div class="center navigator_content">
                <div class="logo">
                    <img src="images/basketball.png" alt="logo" class="logo_img">
                    <div class="logo_name">
                        <h2 style="color: aliceblue;">Manba</h2>
                        <h6 style="color: #ababab;">时光不再仍是挚爱</h6>
                    </div>
                </div>
                <div class="content">
                    <ul class="list">
                        <li class="list_item"><a href="/">首页</a></li>
                        <li class="list_item"><a href="/">编程</a></li>
                        <li class="list_item"><a href="/">旅行</a></li>
                        <li class="list_item"><a href="/">游戏</a></li>
                        <li class="list_item"><a href="/">关于</a></li>
                    </ul>
                </div>
            </div>
        </header>
        <div class="banner">
            <ul class="banner_autoplay">
                <li><img src=""></li>
            </ul>
        </div>
        <script src="https://cdn.bootcss.com/jquery/1.12.4/jquery.min.js"></script>
        <script type="text/javascript">
            $.ajax({
                type: 'GET',
                url: 'http://localhost:3000/banner?type=0',
                data: '',
                dataType: 'JSON',
                success: function (res) {
                    console.log(res.banners);
                    var banners = res.banners;
                    var arr = new Array()
                    for(var i=0;i<banners.length;i++){
                        console.log(banners[i].imageUrl)
                        arr.add(banners[i].imageUrl)
                    }
                    console.log(arr)
                },
                error: function () {
                    alert("网络连接失败！")
                }
            });
        </script>
    </body>
</html>
